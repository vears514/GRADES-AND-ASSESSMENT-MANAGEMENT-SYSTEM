# Example operations for Grade Hub

query ListTerms @auth(expr: "auth != null && auth.uid != ''") {
  terms {
    id
    name
    startDate
    endDate
  }
}

query ListGradesByStudentAndTerm($studentId: String!, $termId: String!) @auth(expr: "auth != null && auth.uid == studentId") {
  grades(where: { studentId: { eq: $studentId }, termId: { eq: $termId } }) {
    studentId
    termId
    subjectCode
    subjectTitle
    units
    instructorName
    gradeValue
    remarks
    status
    publishedAt
    publishedBy
  }
}
