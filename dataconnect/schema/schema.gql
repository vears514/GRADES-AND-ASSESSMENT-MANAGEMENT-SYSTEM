# Grade Hub Data Connect Schema

input GradeInput {
  studentId: String!
  termId: String!
  subjectCode: String!
  subjectTitle: String!
  units: Int!
  instructorName: String!
  gradeValue: String!
  remarks: String
}

type Term @table {
  id: String!
  name: String!
  startDate: Timestamp!
  endDate: Timestamp!
}

type Grade @table {
  studentId: String!
  termId: String!
  subjectCode: String!
  subjectTitle: String!
  units: Int!
  instructorName: String!
  gradeValue: String!
  remarks: String
  status: String! # Draft | Submitted | Published
  publishedAt: Timestamp
  publishedBy: String
}
